<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Portfolio Contacts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent-cyan: #00d4ff;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border-subtle: rgba(255, 255, 255, 0.06);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-subtle);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }
        
        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-cyan), #0066ff);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--bg-primary);
        }
        
        .nav-link-custom {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.2s ease;
            margin-bottom: 0.5rem;
        }
        
        .nav-link-custom:hover, .nav-link-custom.active {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
        }
        
        .main-content {
            margin-left: 260px;
            padding: 2rem;
            min-height: 100vh;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 1.5rem;
        }
        
        .stat-card .stat-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent-cyan);
        }
        
        .contact-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.2s ease;
        }
        
        .contact-card:hover {
            border-color: rgba(0, 212, 255, 0.3);
        }
        
        .contact-card.unread {
            border-left: 3px solid var(--accent-cyan);
            background: rgba(0, 212, 255, 0.03);
        }
        
        .contact-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .badge-unread {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-read {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        .contact-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }
        
        .contact-email {
            color: var(--accent-cyan);
            font-size: 0.9rem;
            text-decoration: none;
        }
        
        .contact-meta {
            display: flex;
            gap: 1.5rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        
        .contact-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .contact-message {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        .contact-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .btn-action {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="brand-icon">AE</div>
            <div>
                <h6 class="mb-0 fw-bold">Admin Panel</h6>
                <small class="text-muted">Portfolio</small>
            </div>
        </div>
        
        <nav class="flex-grow-1">
            <a href="#" class="nav-link-custom active">
                <i class="bi bi-envelope"></i>
                Contactos
                <span class="badge bg-primary ms-auto" id="unreadBadge">0</span>
            </a>
            <a href="/" class="nav-link-custom" target="_blank">
                <i class="bi bi-box-arrow-up-right"></i>
                Ver Portfolio
            </a>
        </nav>
        
        <div class="mt-auto">
            <small class="text-muted">v2.0.0</small>
        </div>
    </aside>
    
    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0">Mensajes de Contacto</h1>
            <button class="btn btn-outline-light btn-sm" onclick="loadContacts()">
                <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
            </button>
        </div>
        
        <div class="row g-3 mb-4" id="statsRow">
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon">
                            <i class="bi bi-inbox"></i>
                        </div>
                        <div>
                            <h3 class="mb-0" id="totalCount">0</h3>
                            <small class="text-muted">Total Mensajes</small>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background: rgba(0, 212, 255, 0.2);">
                            <i class="bi bi-envelope-unread" style="color: #00d4ff;"></i>
                        </div>
                        <div>
                            <h3 class="mb-0" id="unreadCount">0</h3>
                            <small class="text-muted">No Leídos</small>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background: rgba(16, 185, 129, 0.2);">
                            <i class="bi bi-check-circle" style="color: #10b981;"></i>
                        </div>
                        <div>
                            <h3 class="mb-0" id="readCount">0</h3>
                            <small class="text-muted">Leídos</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="contactsContainer">
            <div class="empty-state">
                <i class="bi bi-inbox"></i>
                <h4>Sin mensajes</h4>
                <p>Aún no hay mensajes de contacto</p>
            </div>
        </div>
    </main>

    <script>
        async function loadContacts() {
            try {
                const response = await fetch('/api/contacts');
                const data = await response.json();
                
                document.getElementById('totalCount').textContent = data.stats.total;
                document.getElementById('unreadCount').textContent = data.stats.unread;
                document.getElementById('readCount').textContent = data.stats.read;
                document.getElementById('unreadBadge').textContent = data.stats.unread;
                
                const container = document.getElementById('contactsContainer');
                
                if (data.contacts.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="bi bi-inbox"></i>
                            <h4>Sin mensajes</h4>
                            <p>Aún no hay mensajes de contacto</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = data.contacts.map(contact => `
                    <div class="contact-card ${contact.is_read ? '' : 'unread'}" id="contact-${contact.id}">
                        <div class="contact-header">
                            <div>
                                <div class="contact-name">
                                    ${escapeHtml(contact.name)}
                                    ${contact.company ? `<small class="text-muted ms-2">(${escapeHtml(contact.company)})</small>` : ''}
                                </div>
                                <a href="mailto:${escapeHtml(contact.email)}" class="contact-email">
                                    ${escapeHtml(contact.email)}
                                </a>
                            </div>
                            ${contact.is_read ? 
                                '<span class="badge-read">Leído</span>' : 
                                '<span class="badge-unread">Nuevo</span>'}
                        </div>
                        
                        <div class="contact-meta">
                            ${contact.phone ? `
                                <span><i class="bi bi-phone"></i> ${escapeHtml(contact.phone)}</span>
                            ` : ''}
                            ${contact.subject ? `
                                <span><i class="bi bi-chat-left-text"></i> ${escapeHtml(contact.subject)}</span>
                            ` : ''}
                            <span><i class="bi bi-calendar3"></i> ${formatDate(contact.created_at)}</span>
                            ${contact.ip_address ? `
                                <span><i class="bi bi-globe"></i> ${contact.ip_address}</span>
                            ` : ''}
                        </div>
                        
                        <div class="contact-message">
                            ${escapeHtml(contact.message)}
                        </div>
                        
                        <div class="contact-actions">
                            ${!contact.is_read ? `
                                <button class="btn btn-success btn-action" onclick="markAsRead(${contact.id})">
                                    <i class="bi bi-check2"></i> Marcar como leído
                                </button>
                            ` : ''}
                            <a href="https://wa.me/${contact.phone?.replace(/[^0-9]/g, '') || ''}" 
                               class="btn btn-outline-success btn-action" 
                               target="_blank"
                               ${!contact.phone ? 'style="display:none"' : ''}>
                                <i class="bi bi-whatsapp"></i> WhatsApp
                            </a>
                            <button class="btn btn-outline-danger btn-action" onclick="deleteContact(${contact.id})">
                                <i class="bi bi-trash"></i> Eliminar
                            </button>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading contacts:', error);
            }
        }
        
        async function markAsRead(id) {
            try {
                await fetch(`/api/contacts/${id}/read`, { method: 'PATCH' });
                loadContacts();
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function deleteContact(id) {
            if (!confirm('¿Eliminar este mensaje?')) return;
            
            try {
                await fetch(`/api/contacts/${id}`, { method: 'DELETE' });
                loadContacts();
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('es-ES', {
                day: 'numeric',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        loadContacts();
        setInterval(loadContacts, 30000);
    </script>
</body>
</html>
